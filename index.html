<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="custom-select.css">
    <link rel="stylesheet" href="RowDecideBox.css">
    <link rel="shortcut icon" href="icon.ico" type="image/x-icon">
    <title>俊达萌立绘编辑器</title>
</head>
<body>
    <div id="MainView">
        <div id="TopBar"> <!-- 顶部栏，包含标题和导航栏 -->
            <p>俊达萌立绘编辑器</p>
            <button onclick="download()">导出</button>
        </div>

        <div id="CanvasView">
            <canvas id="CanvasCanvas" width="300" height="600" style="display: none;"></canvas>
            <img id="CanvasImg">
        </div>
        <div id="SettingView">
            <h1>效果</h1>
            <div name="ZunSelect">  <!-- 立绘款式选择框 -->
                <p>立绘款式</p> <!-- 标题 -->

                <div class="custom-select" id="zun-select-wrapper"> <!-- 下拉框容器 -->
                    <div class="select-trigger">
                        <span class="selected-text">Zundamon v2.3</span>
                        <span class="select-arrow">▼</span>
                    </div>
                    <div class="select-options">
                        <div class="option selected" data-value="zun2">Zundamon v2.3</div>
                    </div>
                </div> <!-- 下拉框容器 -->

            </div><!-- 立绘款式选择框 -->

            <div id="Head_Style"> <!-- 头部样式 -->
                <p>头部样式</p> <!-- 标题 -->

                <div class="DecideBox" id="HeadStyle_Select">
                    <!--后期js添加选项-->
                </div>
                
            </div>

            <div id="Head_Top"> <!-- 头顶样式 -->
                <p>头顶样式</p> <!-- 标题 -->

                <div class="DecideBox" id="HeadTop_Select">
                    <!--后期js添加选项-->
                </div>
                
            </div>
            
            <div id="Head_Eyebrow"> <!-- 眉样式 -->
                <p>眉样式</p> <!-- 标题 -->

                <div class="DecideBox" id="HeadEyebrow_Select">
                    <!--后期js添加选项-->
                </div>
                
            </div>

            <div id="Head_Eye"> <!-- 目样式 -->
                <p>目样式</p> <!-- 标题 -->

                <div class="DecideBox" id="HeadEye_Select">
                    <!--后期js添加选项-->
                </div>
                
            </div>

            <div id="Head_Eye_Set"> <!-- 眼睛样式 -->
                <p>眼睛样式</p> <!-- 标题 -->

                <div class="DecideBox" id="Eye_Select">
                    <!--后期js添加选项-->
                </div>
                
            </div>

            <div id="Face"> <!-- 人脸样式 -->
                <p>人脸样式</p> <!-- 标题 -->

                <div class="DecideBox" id="Face_Select">
                    <!--后期js添加选项-->
                </div>
                
            </div>
            
            <div id="Mouth"> <!-- 口样式 -->
                <p>口样式</p> <!-- 标题 -->

                <div class="DecideBox" id="Mouth_Select">
                    <!--后期js添加选项-->
                </div>
                
            </div>
            
            <div id="Clothing"> <!-- 服装样式 -->
                <p>服装样式</p> <!-- 标题 -->

                <div class="DecideBox" id="Clothing_Select">
                    <!--后期js添加选项-->
                </div>
                
            </div>
            
            <div id="RightArm"> <!-- 右腕样式 -->
                <p>右腕样式</p> <!-- 标题 -->

                <div class="DecideBox" id="RightArm_Select">
                    <!--后期js添加选项-->
                </div>
                
            </div>
            
            <div id="LeftArm"> <!-- 左腕样式 -->
                <p>左腕样式</p> <!-- 标题 -->

                <div class="DecideBox" id="LeftArm_Select">
                    <!--后期js添加选项-->
                </div>
                
            </div>

        </div>
    </div>
    
    <div id="BackGround">
        <div id="About">
            <h1>关于</h1>
            <h4>俊达萌立绘编辑器 v0.1</h4>
            <p>可以编辑俊达萌立绘的小工具</p>
            <p>插画：坂本アヒル(坂本Ahiru)</p>
            <p>代码：这里是Ywang(Winnako)</p>
            <p>非商业用途</p>
            <img src="ico.png" alt="">
        </div>
    </div>
    
</body>
    <script src="custom-select.js"></script>
    <script src="horizontal-scroll.js"></script>
    <script src="sources.js"></script>
    <script src="script.js"></script>
</html>
